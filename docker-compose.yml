services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SQLALCHEMY_DATABASE_URI: "sqlite:////data/production.sqlite"
    ports:
      - "${HOST_PORT:-5000}:${HOST_PORT:-5000}"
    volumes:
      - ./.env:/home/node/app/.env.production
      - ./db_data:/data
